<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTransport OSC Hub Client</title>
    <script src="https://cdn.jsdelivr.net/npm/osc-js@2.1.0/lib/osc.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #00ff00; padding: 20px; line-height: 1.4; }
        #log { border: 1px solid #333; height: 350px; overflow-y: scroll; padding: 10px; background: #000; font-size: 12px; margin-top: 10px; }
        .status-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .status-box { padding: 10px; border-radius: 4px; background: #222; flex: 1; border: 1px solid #444; }
        .active { color: #00ff00; font-weight: bold; }
        .inactive { color: #ff4444; }
        .osc-msg { color: #00ccff; border-left: 2px solid #00ccff; padding-left: 8px; margin: 4px 0; }
        .osc-path { font-weight: bold; color: #ffcc00; }
        .controls { background: #222; padding: 15px; border-radius: 4px; border: 1px solid #444; }
        .input-group { margin-bottom: 10px; }
        label { display: inline-block; width: 120px; color: #aaa; }
        input { background: #000; color: #00ff00; border: 1px solid #444; padding: 5px; width: 250px; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 8px 16px; cursor: pointer; border-radius: 4px; }
        button:hover:not(:disabled) { background: #444; border-color: #00ff00; }
        button:disabled { opacity: 0.5; }
        #client-info { display: none; background: #222; border: 1px solid #444; border-radius: 4px; padding: 10px; margin-top: 15px; }
        #client-id-display { color: #ffcc00; font-size: 1.4em; font-weight: bold; letter-spacing: 0.1em; }
        #participants-list { color: #00ccff; margin-top: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <h2>WebTransport OSC Hub</h2>

    <div class="status-container">
        <div class="status-box">Hub (WebTransport): <span id="wt-status" class="inactive">Disconnected</span></div>
        <div class="status-box">Bridge (WebSocket): <span id="ws-status" class="inactive">Disconnected</span></div>
    </div>
    
    <div class="controls">
        <div class="input-group">
            <label>Session ID:</label>
            <input type="text" id="sessionId" placeholder="Enter session ID">
        </div>
        <div class="input-group">
            <label>Your Name:</label>
            <input type="text" id="displayName" placeholder="Enter your name (optional)">
        </div>
        <div class="input-group">
            <label>Bridge Port:</label>
            <input type="text" id="bridgePort" placeholder="8080" value="8080" style="width:80px;">
        </div>
        <button onclick="connectAll()" id="connectBtn">Connect All</button>
    </div>

    <div id="client-info">
        <span style="color:#aaa;">Your Client ID:</span>
        <span id="client-id-display">—</span>
        <span style="color:#aaa; margin-left:16px;">Name:</span>
        <span id="display-name-display" style="color:#ffcc00; font-weight:bold;">—</span>
        <div id="participants-list"></div>
    </div>

    <div id="log"></div>

    <script>
        /**
         * WebTransport OSC Hub Client
         * Handles bidirectional OSC relaying between WebTransport and Local WebSocket Bridge.
         */

        let transport;  // WebTransport instance
        let wsBridge;   // Local WebSocket Bridge (bridge.js)
        let datagramWriter = null;  // Persistent datagram writer
        let myClientId = null;
        let reconnectDelay = 1000;
        const MAX_RECONNECT_DELAY = 30000;

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function addLog(msg, isOsc = false) {
            const log = document.getElementById('log');
            const className = isOsc ? 'osc-msg' : '';
            log.innerHTML += `<div class="${className}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // --- 1. Local WebSocket Bridge (bridge.js) Connection ---
        function connectLocalBridge() {
            const port = document.getElementById('bridgePort').value.trim() || '8080';
            wsBridge = new WebSocket(`ws://localhost:${port}`);
            wsBridge.binaryType = 'arraybuffer';

            wsBridge.onopen = () => {
                document.getElementById('ws-status').textContent = "Connected";
                document.getElementById('ws-status').className = "active";
                addLog("Local Bridge Connected.");
            };

            wsBridge.onmessage = async (event) => {
                const arrayBuffer = event.data;
                const data = new Uint8Array(arrayBuffer);

                // OSC bundles ('#bundle', first byte 0x23): always use Stream.
                // Bundles carry timetags for synchronized timing — reliable delivery is required.
                if (data[0] === 0x23) {
                    const stream = await transport.createUnidirectionalStream();
                    const writer = stream.getWriter();
                    await writer.write(data);
                    await writer.close();
                    addLog(`[Stream] Sent bundle (${data.length} bytes)`, true);
                    return;
                }

                try {
                    const message = new OSC.Message();
                    const view = new DataView(arrayBuffer);
                    message.unpack(view);
                    const path = message.address;

                    // --- Traffic Routing Logic ---
                    // Stream (reliable) is used for:
                    // 1. SynthDef commands (/d_)
                    // 2. Buffer commands (/b_)
                    // 3. Sync commands (/sy) — for async command synchronization
                    // 4. Large payloads (> 1000 bytes)
                    // All other messages use Datagrams for minimum latency.
                    const useStream =
                        path.startsWith('/d_') ||
                        path.startsWith('/b_') ||
                        path.startsWith('/sy') ||
                        data.length > 1000;

                    if (useStream) {
                        const stream = await transport.createUnidirectionalStream();
                        const writer = stream.getWriter();
                        await writer.write(data);
                        await writer.close();
                        addLog(`[Stream] Sent: ${escapeHtml(path)} (${data.length} bytes)`, true);
                    } else {
                        await datagramWriter.write(data);
                        addLog(`[Datagram] Sent: ${escapeHtml(path)}`, true);
                    }
                } catch (e) {
                    // Fallback for unrecognised OSC (not a bundle, not a standard message)
                    if (data.length > 1000) {
                        const stream = await transport.createUnidirectionalStream();
                        const writer = stream.getWriter();
                        await writer.write(data);
                        await writer.close();
                    } else {
                        await datagramWriter.write(data);
                    }
                    console.warn("Raw forwarding (OSC parse error):", e);
                }
            };

            wsBridge.onclose = () => {
                document.getElementById('ws-status').textContent = "Disconnected";
                document.getElementById('ws-status').className = "inactive";
                // Auto-reconnect to local bridge
                setTimeout(connectLocalBridge, 3000);
            };
        }

        // --- 2. WebTransport (Remote Hub) Connection ---
        // Returns: 'connected' | 'rejected' (409) | 'failed' (network error)
        async function connectHub(opts = {}) {
            const sid = document.getElementById('sessionId').value.trim();

            // Automatically use the hostname of the server serving this page.
            // If the Web server and Hub server are on different machines,
            // replace window.location.hostname with the Hub server's hostname directly:
            //   const baseUrl = "your-hub-server.example.com";
            const baseUrl = window.location.hostname;
            const nameInput = document.getElementById('displayName').value.trim();

            if (!sid) {
                addLog("<span style='color: #ff4444;'>Error: Session ID is required.</span>");
                alert("Please enter a Session ID.");
                document.getElementById('connectBtn').disabled = false;
                return 'failed';
            }

            // Release any previous datagram writer before creating a new transport
            if (datagramWriter) {
                try { datagramWriter.releaseLock(); } catch {}
                datagramWriter = null;
            }

            const nameParam = nameInput ? `&name=${encodeURIComponent(nameInput)}` : '';
            const fullUrl = `https://${baseUrl}:8443/join?id=${sid}${nameParam}`;

            try {
                addLog(`Connecting to Hub: https://${escapeHtml(baseUrl)}:8443 (Session: ${escapeHtml(sid)})...`);
                transport = new WebTransport(fullUrl);
                await transport.ready;

                // Acquire a persistent datagram writer for the session
                datagramWriter = transport.datagrams.writable.getWriter();

                document.getElementById('wt-status').textContent = "Connected";
                document.getElementById('wt-status').className = "active";

                // Initialize Listeners
                receiveDatagrams();
                receiveStreams();
                return 'connected';
            } catch (e) {
                const msg = e.message || String(e);
                if (msg.includes('409') || msg.includes('conflict')) {
                    addLog(`<span style='color:#ff4444;'>Hub rejected: name already in use in this session.</span>`);
                    document.getElementById('connectBtn').disabled = false;
                    return 'rejected';
                } else {
                    addLog(`Hub connection failed: ${escapeHtml(msg)}`);
                    if (!opts.fromReconnect) {
                        document.getElementById('connectBtn').disabled = false;
                    }
                    return 'failed';
                }
            }
        }

        // --- 2a. Reconnection logic ---
        function watchHubConnection() {
            transport.closed
                .then(() => handleHubDisconnect())
                .catch(() => handleHubDisconnect());
        }

        function handleHubDisconnect() {
            if (datagramWriter) {
                try { datagramWriter.releaseLock(); } catch {}
                datagramWriter = null;
            }
            document.getElementById('wt-status').textContent = "Disconnected";
            document.getElementById('wt-status').className = "inactive";
            document.getElementById('connectBtn').disabled = false;
            scheduleReconnect();
        }

        async function scheduleReconnect() {
            addLog(`Hub disconnected. Reconnecting in ${reconnectDelay / 1000}s...`);
            await new Promise(r => setTimeout(r, reconnectDelay));
            reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);

            // User manually clicked Connect while waiting — let that take over
            if (document.getElementById('connectBtn').disabled) return;

            document.getElementById('connectBtn').disabled = true;
            const result = await connectHub({ fromReconnect: true });
            if (result === 'connected') {
                reconnectDelay = 1000;
                watchHubConnection();
            } else if (result === 'rejected') {
                // Name conflict — don't retry
            } else {
                // Network failure — retry with longer delay
                scheduleReconnect();
            }
        }

        // --- 3. Receiving Logic (Datagram & Stream) ---
        async function receiveDatagrams() {
            const reader = transport.datagrams.readable.getReader();
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                forwardToBridge(value, "Datagram");
            }
        }

        async function receiveStreams() {
            const reader = transport.incomingUnidirectionalStreams.getReader();
            while (true) {
                const { value: stream, done } = await reader.read();
                if (done) break;

                const sReader = stream.getReader();
                let chunks = [];
                while (true) {
                    const { value, done } = await sReader.read();
                    if (done) break;
                    chunks.push(value);
                }
                
                // Reassemble Stream Chunks
                const totalLength = chunks.reduce((acc, c) => acc + c.length, 0);
                const combined = new Uint8Array(totalLength);
                let offset = 0;
                for (const c of chunks) { 
                    combined.set(c, offset); 
                    offset += c.length; 
                }
                
                forwardToBridge(combined, "Stream");
            }
        }

        function parseOscArgs(data) {
            // Returns {address, args:[]} from raw OSC bytes
            try {
                const message = new OSC.Message();
                message.unpack(data.buffer, data.byteOffset, data.byteLength);
                return { address: message.address, args: message.args };
            } catch(e) {
                return null;
            }
        }

        function forwardToBridge(data, type) {
            // Normalize data for Stream: skip any framing bytes before OSC data.
            // OSC data begins with '/' (0x2F, message) or '#' (0x23, bundle header).
            let oscData = data;
            if (type === "Stream") {
                const start = data.findIndex(b => b === 47 || b === 35);
                if (start > 0) oscData = data.slice(start);
            }

            const parsed = parseOscArgs(oscData);
            const address = parsed ? parsed.address : null;

            // Handle Hub-only messages — do NOT forward to SC
            // /welcome: assigned client ID on connect — UI display only, not forwarded to SC
            // /who/reply: participant list — displayed in UI and also forwarded to SC for OSCdef(\whoReply)
            if (address === '/welcome') {
                myClientId = parsed.args[0];
                const myDisplayName = parsed.args[1] || myClientId;
                document.getElementById('client-id-display').textContent = myClientId;
                document.getElementById('display-name-display').textContent = myDisplayName;
                document.getElementById('client-info').style.display = 'block';
                addLog(`Joined as <span style="color:#ffcc00;font-weight:bold;">${escapeHtml(myDisplayName)}</span> (ID: ${escapeHtml(String(myClientId))})`);
                return;
            }

            if (address === '/who/reply') {
                const ids = parsed.args;
                document.getElementById('participants-list').textContent =
                    'Participants: ' + ids.join(', ');
                addLog(`[/who/reply] Participants in session: ${escapeHtml(ids.join(', '))}`, true);
                // Also forward to SC so OSCdef(\whoReply) can receive it
                if (wsBridge && wsBridge.readyState === WebSocket.OPEN) {
                    wsBridge.send(oscData);
                }
                return;
            }

            // Forward all other messages to SC via bridge
            if (wsBridge && wsBridge.readyState === WebSocket.OPEN) {
                wsBridge.send(oscData);
            }

            if (address) {
                addLog(`<span class="osc-path">${escapeHtml(address)}</span> [${type}]`, true);
            } else {
                addLog(`Received ${type}: ${data.length} bytes`);
            }
        }

        // --- 4. Controller ---
        async function connectAll() {
            reconnectDelay = 1000;  // reset backoff on manual connect
            document.getElementById('connectBtn').disabled = true;
            const result = await connectHub();
            if (result === 'connected') {
                watchHubConnection();
                connectLocalBridge();
            }
            // On 'rejected' or 'failed': connectHub already re-enabled the button
        }
    </script>
</body>
</html>
